server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/slms2026_db
    username: postgres
    password: 12345678
    driver-class-name: org.postgresql.Driver

  jpa:
    generate-ddl: true
    hibernate:
      ddl-auto: update # Tự động tạo hoặc cập nhật cấu trúc bảng từ Entity xuống DB
    show-sql: true     # In các câu lệnh SQL ra Console để tiện debug
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

