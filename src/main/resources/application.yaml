server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    generate-ddl: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 210MB

app:
  cors:
    allowed-origin-patterns:
      - http://localhost:*
      - http://127.0.0.1:*
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    exposed-headers:
      - Authorization
    allow-credentials: true
    max-age-seconds: 3600
  qr:
    base-url: https://localhost:8080/maintenance/scan
  upload:
    property-images:
      dir: ${PROPERTY_IMAGES_DIR:uploads/properties}
      public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:8080}

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

# OCR đọc chỉ số điện nước (OCR.space). Đăng ký key free tại https://ocr.space/ocrapi
ocr:
  space:
    base-url: https://api.ocr.space/parse/image
    api-key: ${OCR_SPACE_API_KEY:helloworld}   # 'helloworld' là key demo giới hạn, nên thay bằng key free riêng

# Thanh toán cọc qua PayOS (https://payos.vn). Lấy key ở Dashboard PayOS.
payos:
  client-id: ${PAYOS_CLIENT_ID:}
  api-key: ${PAYOS_API_KEY:}
  checksum-key: ${PAYOS_CHECKSUM_KEY:}
  # URL FE/mobile sẽ redirect về sau khi thanh toán (deep link hoặc trang web)
  return-url: ${PAYOS_RETURN_URL:slms://payment-success}
  cancel-url: ${PAYOS_CANCEL_URL:slms://payment-cancel}

# Gửi SMS OTP qua Twilio (https://www.twilio.com). Lấy key tại Twilio Console.
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  from-number: ${TWILIO_FROM_NUMBER:}
  otp:
    expiry-minutes: ${TWILIO_OTP_EXPIRY_MINUTES:5}
    max-attempts: ${TWILIO_OTP_MAX_ATTEMPTS:5}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha