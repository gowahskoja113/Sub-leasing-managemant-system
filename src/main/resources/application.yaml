server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    generate-ddl: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  qr:
    base-url: https://localhost:8080/maintenance/scan

payos:
    client-id: ${CLIENT_ID}
    api-key: ${YOUR_API_KEY}
    checksum-key: ${CHECKSUM_KEY}

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000